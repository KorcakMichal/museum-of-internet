<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Museum of Internet — Room Generator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --bg:       #0d0d1a;
      --panel:    #12122a;
      --border:   #2a2a5a;
      --accent:   #5b5bff;
      --accent2:  #ff5bac;
      --text:     #e0e0ff;
      --muted:    #6060a0;
      --pixel:    4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      image-rendering: pixelated;
    }

    /* ── Scanline overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,.18) 3px,
        rgba(0,0,0,.18) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── Layout ── */
    #app {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: clamp(10px, 2.5vw, 18px);
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent), 3px 3px 0 #000;
      line-height: 1.7;
    }
    header p {
      margin-top: 16px;
      font-size: clamp(6px, 1.5vw, 9px);
      color: var(--muted);
      line-height: 2;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--panel);
      border: var(--pixel) solid var(--border);
      box-shadow: 8px 8px 0 #000;
      padding: 32px;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="url"] {
      flex: 1 1 260px;
      background: #08081a;
      border: var(--pixel) solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 8px;
      padding: 12px 14px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="url"]::placeholder { color: var(--muted); }
    input[type="url"]:focus { border-color: var(--accent); }

    button {
      font-family: inherit;
      font-size: 8px;
      cursor: pointer;
      border: none;
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      box-shadow: 4px 4px 0 #000;
      transition: transform .08s, box-shadow .08s;
      white-space: nowrap;
    }
    button:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #000; }
    button:active { transform: translate(2px, 2px);  box-shadow: 2px 2px 0 #000; }
    button:disabled {
      background: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: 4px 4px 0 #000;
    }

    /* ── Status bar ── */
    #status {
      margin-top: 18px;
      font-size: 7px;
      color: var(--muted);
      min-height: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #status.error { color: #ff5b5b; }
    #status.ok    { color: #5bff8f; }

    /* ── Blinking cursor loader ── */
    .blink {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--accent2);
      animation: blink .7s step-end infinite;
      vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Game frame ── */
    #game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      border: var(--pixel) solid var(--border);
      border-bottom: none;
      padding: 10px 16px;
      font-size: 7px;
      color: var(--muted);
    }
    #game-title { color: var(--accent2); font-size: 8px; }
    #btn-close {
      background: #3a0010;
      font-size: 7px;
      padding: 6px 10px;
      box-shadow: 2px 2px 0 #000;
    }
    #btn-close:hover { background: #ff5b5b; color: #000; }

    #game-frame {
      display: block;
      width: 100%;
      border: var(--pixel) solid var(--border);
      border-top: none;
      background: #000;
    }

    #design-ref {
      margin-top: 20px;
      border-top: var(--pixel) solid var(--border);
      padding-top: 16px;
    }
    #style-brief {
      width: 100%;
      min-height: 72px;
      margin-top: 14px;
      margin-bottom: 14px;
      background: #08081a;
      border: var(--pixel) solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 7px;
      line-height: 1.7;
      padding: 10px 12px;
      resize: vertical;
      outline: none;
    }
    #style-brief:focus { border-color: var(--accent); }
    #design-ref h2 {
      font-size: 8px;
      color: var(--accent2);
      margin-bottom: 10px;
    }
    #design-ref p {
      font-size: 7px;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 12px;
    }
    #design-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 8px;
    }
    #design-grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border: 3px solid var(--border);
      box-shadow: 3px 3px 0 #000;
      image-rendering: pixelated;
      cursor: pointer;
      background: #08081a;
    }
    #design-grid img.selected {
      border-color: var(--accent2);
      box-shadow: 0 0 0 2px #000, 0 0 0 4px var(--accent2);
    }

    /* ── Output area (game + concept side by side) ── */
    #output-area {
      display: none;
      width: 100%;
      max-width: 1300px;
      margin-top: 36px;
      align-items: flex-start;
      gap: 20px;
    }

    #game-wrap {
      flex: 1 1 600px;
      min-width: 0;
    }

    /* ── Concept panel ── */
    #concept-panel {
      flex: 0 0 280px;
      width: 280px;
      background: var(--panel);
      border: var(--pixel) solid var(--border);
      box-shadow: 8px 8px 0 #000;
      overflow: hidden;
    }
    #concept-panel h3 {
      font-size: 7px;
      color: var(--accent2);
      padding: 10px 14px;
      border-bottom: 2px solid var(--border);
      background: #0d0d1a;
      letter-spacing: 1px;
    }
    #concept-body {
      padding: 14px;
      font-size: 6px;
      line-height: 2;
      color: var(--text);
      max-height: 600px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    #concept-body .concept-line {
      display: block;
      margin-bottom: 10px;
    }
    #concept-body .concept-key {
      color: var(--accent);
      display: block;
      margin-bottom: 3px;
    }
    #concept-body .concept-val {
      color: var(--text);
      display: block;
      padding-left: 8px;
      border-left: 2px solid var(--border);
      line-height: 1.9;
    }

    @media (max-width: 680px) {
      .card { padding: 20px; }
      #design-grid { grid-template-columns: repeat(3, 1fr); }
      #output-area { flex-direction: column; }
      #concept-panel { flex: none; width: 100%; }
    }
    @media (min-width: 681px) {
      #output-area { display: none; }
      #output-area.visible { display: flex; }
    }
    @media (max-width: 680px) {
      #output-area { display: none; }
      #output-area.visible { display: flex; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>MUSEUM OF INTERNET<br>ROOM GENERATOR</h1>
      <p>Enter any website URL and step inside<br>a pixel-art room that represents it.</p>
    </header>

    <div class="card">
      <div class="form-row">
        <input
          id="url-input"
          type="url"
          placeholder="https://example.com"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="btn-generate">GENERATE</button>
      </div>
      <div id="status"></div>

      <section id="design-ref">
        <h2>DESIGN REFERENCES</h2>
        <p>Describe the look you want and select up to 3 examples to pass as image references.</p>
        <textarea
          id="style-brief"
          maxlength="800"
          placeholder="Describe style... e.g. cozy cyber cafe, neon signs, warm floor lights, cluttered desks, lots of plants"
        ></textarea>
        <div id="design-grid"></div>
      </section>
    </div>

    <div id="output-area">
      <div id="game-wrap">
        <div id="game-header">
          <span id="game-title"></span>
          <button id="btn-close">✕ CLOSE</button>
        </div>
        <iframe
          id="game-frame"
          sandbox="allow-scripts allow-same-origin"
          title="Generated minigame"
          frameborder="0"
          scrolling="no"
        ></iframe>
      </div>

      <div id="concept-panel">
        <h3>CREATIVE BRIEF</h3>
        <div id="concept-body"></div>
      </div>
    </div>
  </div>

  <script>
    const urlInput       = document.getElementById('url-input');
    const btnGenerate    = document.getElementById('btn-generate');
    const statusEl       = document.getElementById('status');
    const outputArea     = document.getElementById('output-area');
    const gameWrap       = document.getElementById('game-wrap');
    const gameFrame      = document.getElementById('game-frame');
    const gameTitle      = document.getElementById('game-title');
    const btnClose       = document.getElementById('btn-close');
    const designGrid     = document.getElementById('design-grid');
    const styleBriefInput = document.getElementById('style-brief');
    const conceptBody    = document.getElementById('concept-body');

    let blobUrl = null;
    const selectedDesignRefs = new Set();
    const designFiles = [
      'M%C3%A9dia.png',
      'M%C3%A9dia%20(1).png',
      'M%C3%A9dia%20(2).png',
      'shared%20image.png',
      'shared%20image%20(1).png',
      'shared%20image%20(2).png',
      'shared%20image%20(3).png',
      'shared%20image%20(4).png',
      'shared%20image%20(5).png',
      'shared%20image%20(6).png',
      'shared%20image%20(7).png',
      'shared%20image%20(8).png',
      'shared%20image%20(9).png',
      'shared%20image%20(10).png',
      'shared%20image%20(11).png',
      'shared%20image%20(12).png',
    ];

    function renderDesignRefs() {
      designGrid.innerHTML = '';
      for (const file of designFiles) {
        const src = `/design/exmaples/${file}`;
        const img = document.createElement('img');
        img.src = src;
        img.alt = decodeURIComponent(file);
        img.title = decodeURIComponent(file);
        img.onerror = () => {
          if (img.src.endsWith('.png')) {
            img.src = img.src.replace('.png', '.jfif');
          }
        };

        img.addEventListener('click', () => {
          if (selectedDesignRefs.has(src)) {
            selectedDesignRefs.delete(src);
            img.classList.remove('selected');
            return;
          }

          if (selectedDesignRefs.size >= 3) {
            setStatus('You can select up to 3 design references.', 'error');
            return;
          }

          selectedDesignRefs.add(src);
          img.classList.add('selected');
        });

        designGrid.appendChild(img);
      }
    }

    function setStatus(msg, type = '') {
      statusEl.className = type;
      statusEl.innerHTML =
        type === 'loading'
          ? `<span class="blink"></span> ${msg}`
          : msg;
    }

    function resizeFrame() {
      // Give the iframe enough height to fit the game (960×640 default)
      gameFrame.style.height = Math.min(window.innerWidth, 980) * (640 / 960) + 'px';
    }

    window.addEventListener('resize', resizeFrame);

    btnGenerate.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url) {
        setStatus('Please enter a URL.', 'error');
        urlInput.focus();
        return;
      }

      // Basic URL sanity check before sending
      try { new URL(url); } catch {
        setStatus('Invalid URL — include https://', 'error');
        return;
      }

      btnGenerate.disabled = true;
      setStatus('Scraping website…', 'loading');

      // Hide any previous output
      outputArea.classList.remove('visible');
      conceptBody.innerHTML = '';
      if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }

      // Step indicators so user knows it's running fresh each time
      const stepTimer = setTimeout(() => setStatus('Step 1/2 — building creative brief…', 'loading'), 1500);
      const stepTimer2 = setTimeout(() => setStatus('Step 2/2 — generating room HTML…', 'loading'), 8000);

      try {
        const response = await fetch('/create-minigame', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url,
            designReferences: Array.from(selectedDesignRefs),
            styleBrief: styleBriefInput.value,
          }),
        });

        const data = await response.json();
        clearTimeout(stepTimer); clearTimeout(stepTimer2);

        if (!response.ok || !data.success) {
          throw new Error(data.error || `Server error ${response.status}`);
        }

        // Populate concept panel
        if (data.creativeConcept) {
          conceptBody.innerHTML = renderConcept(data.creativeConcept);
        }

        // Render the game HTML inside the sandboxed iframe via a blob URL
        const blob = new Blob([data.html], { type: 'text/html' });
        blobUrl = URL.createObjectURL(blob);
        gameFrame.src = blobUrl;

        gameTitle.textContent = `▶ ${data.title || url}`;
        resizeFrame();
        outputArea.classList.add('visible');
        outputArea.scrollIntoView({ behavior: 'smooth', block: 'start' });

        setStatus('Room ready! Click inside to focus it, then walk around with WASD / arrow keys.', 'ok');
      } catch (err) {
        clearTimeout(stepTimer); clearTimeout(stepTimer2);
        setStatus(`Error: ${err.message}`, 'error');
      } finally {
        btnGenerate.disabled = false;
      }
    });

    // Allow submitting with Enter key
    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') btnGenerate.click();
    });

    btnClose.addEventListener('click', () => {
      outputArea.classList.remove('visible');
      gameFrame.src = 'about:blank';
      conceptBody.innerHTML = '';
      if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl = null; }
      setStatus('');
    });

    function renderConcept(text) {
      // Parse "Key: value" lines into styled blocks
      const lines = text.split('\n').filter(l => l.trim());
      let html = '';
      for (const line of lines) {
        const colonIdx = line.indexOf(':');
        if (colonIdx > 0) {
          const key = line.slice(0, colonIdx).trim();
          const val = line.slice(colonIdx + 1).trim();
          html += `<span class="concept-line">`
               +  `<span class="concept-key">${escHtml(key)}</span>`
               +  `<span class="concept-val">${escHtml(val)}</span>`
               + `</span>`;
        } else {
          html += `<span class="concept-line" style="color:var(--muted)">${escHtml(line)}</span>`;
        }
      }
      return html;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    renderDesignRefs();
  </script>
</body>
</html>
